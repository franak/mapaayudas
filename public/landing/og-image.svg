<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f36"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="300" fill="rgba(230,126,34,0.08)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(230,126,34,0.06)"/>
  
  <!-- Building icons -->
  <g transform="translate(200, 200)" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <!-- Building 1 -->
    <rect x="0" y="0" width="80" height="120" rx="4"/>
    <line x1="20" y1="0" x2="20" y2="120"/>
    <line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/>
    <line x1="0" y1="40" x2="80" y2="40"/>
    <line x1="0" y1="80" x2="80" y2="80"/>
    
    <!-- Building 2 -->
    <rect x="100" y="40" width="60" height="80" rx="4"/>
    <line x1="115" y1="40" x2="115" y2="120"/>
    <line x1="130" y1="40" x2="130" y2="120"/>
    <line x1="145" y1="40" x2="145" y2="120"/>
    <line x1="100" y1="65" x2="160" y2="65"/>
    
    <!-- Building 3 -->
    <rect x="180" y="20" width="100" height="100" rx="4"/>
    <line x1="205" y1="20" x2="205" y2="120"/>
    <line x1="230" y1="20" x2="230" y2="120"/>
    <line x1="255" y1="20" x2="255" y2="120"/>
    <line x1="180" y1="45" x2="280" y2="45"/>
    <line x1="180" y1="85" x2="280" y2="85"/>
  </g>
  
  <!-- Sun/Energy symbol -->
  <g transform="translate(850, 200)">
    <circle cx="0" cy="0" r="80" fill="url(#accent)" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="#1a1f36"/>
    <!-- Sun rays -->
    <g stroke="url(#accent)" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-70" x2="0" y2="-90"/>
      <line x1="50" y1="-50" x2="65" y2="-65"/>
      <line x1="70" y1="0" x2="90" y2="0"/>
      <line x1="50" y1="50" x2="65" y2="65"/>
      <line x1="0" y1="70" x2="0" y2="90"/>
      <line x1="-50" y1="50" x2="-65" y2="65"/>
      <line x1="-70" y1="0" x2="-90" y2="0"/>
      <line x1="-50" y1="-50" x2="-65" y2="-65"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="600" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff">
    MAPA DE AYUDAS
  </text>
  <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#e67e22">
    Rehabilitación Energética Madrid
  </text>
  
  <!-- Footer bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">
    ISAMART • ayudas.isamart.es
  </text>
</svg>
