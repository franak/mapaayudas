<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#d35400"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#dee2e6" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Main building illustration -->
  <g transform="translate(250, 150)">
    <!-- Building shadow -->
    <ellipse cx="150" cy="280" rx="120" ry="20" fill="rgba(0,0,0,0.1)"/>
    
    <!-- Building -->
    <rect x="30" y="50" width="240" height="220" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>
    <rect x="30" y="50" width="240" height="40" rx="8" fill="url(#accent)"/>
    
    <!-- Windows -->
    <g fill="#e67e22" opacity="0.8">
      <rect x="60" y="110" width="40" height="50" rx="2"/>
      <rect x="120" y="110" width="40" height="50" rx="2"/>
      <rect x="180" y="110" width="40" height="50" rx="2"/>
      <rect x="60" y="180" width="40" height="50" rx="2"/>
      <rect x="120" y="180" width="40" height="50" rx="2"/>
      <rect x="180" y="180" width="40" height="50" rx="2"/>
    </g>
    
    <!-- Door -->
    <rect x="120" y="230" width="60" height="40" rx="2" fill="#2d3748"/>
  </g>
  
  <!-- Floating cards with icons -->
  <g>
    <!-- Card 1 - COAM -->
    <rect x="50" y="100" width="140" height="80" rx="8" fill="#ffffff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="90" cy="140" r="16" fill="#e67e22"/>
    <text x="90" y="145" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">📋</text>
    <text x="120" y="145" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1f36">COAM</text>
    <text x="120" y="162" font-family="Arial" font-size="10" fill="#718096">Mapa de Ayudas</text>
    
    <!-- Card 2 - Plan Recuperación -->
    <rect x="610" y="80" width="150" height="80" rx="8" fill="#ffffff" stroke="#2c5282" stroke-width="2"/>
    <circle cx="650" cy="120" r="16" fill="#2c5282"/>
    <text x="650" y="125" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">🇪🇸</text>
    <text x="685" y="125" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1f36">Plan Rec.</text>
    <text x="685" y="142" font-family="Arial" font-size="10" fill="#718096">Gobierno</text>
    
    <!-- Card 3 - Comunidad Madrid -->
    <rect x="50" y="420" width="150" height="80" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2"/>
    <circle cx="90" cy="460" r="16" fill="#27ae60"/>
    <text x="90" y="465" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">🏛️</text>
    <text x="125" y="460" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1f36">C. Madrid</text>
    <text x="125" y="477" font-family="Arial" font-size="10" fill="#718096">Programas</text>
    
    <!-- Card 4 - ISAMART -->
    <rect x="580" y="440" width="170" height="80" rx="8" fill="#1a1f36"/>
    <text x="665" y="480" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#e67e22">ISAMART</text>
    <text x="665" y="500" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffffff">Asesoría experta</text>
  </g>
  
  <!-- Sun/Energy symbol top right -->
  <g transform="translate(700, 50)">
    <circle cx="0" cy="0" r="40" fill="url(#accent)" opacity="0.9"/>
    <g stroke="#f39c12" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-50" x2="0" y2="-60"/>
      <line x1="35" y1="-35" x2="42" y2="-42"/>
      <line x1="50" y1="0" x2="60" y2="0"/>
      <line x1="35" y1="35" x2="42" y2="42"/>
    </g>
  </g>
  
  <!-- Bottom text -->
  <text x="400" y="570" text-anchor="middle" font-family="Arial" font-size="14" fill="#718096">
    Encuentra las mejores ayudas para rehabilitar tu vivienda en Madrid
  </text>
</svg>
